<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dare Generator Pro 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body {
    height:100vh;
    background:linear-gradient(135deg,#0f2027,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container {
    width:420px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    padding:25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h1 {
    color:#00ffe1;
    margin-bottom:20px;
    user-select:none;
}

.admin {
    display:none;
    margin-bottom:10px;
}

input {
    width:70%;
    padding:10px;
    border-radius:10px;
    border:none;
}

.addBtn {
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00ffe1;
    cursor:pointer;
}

.list {
    max-height:120px;
    overflow:auto;
    margin-top:10px;
}

.dare-item {
    background:rgba(255,255,255,0.1);
    margin:5px;
    padding:8px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
}

.remove {
    background:red;
    border:none;
    color:white;
    padding:3px 8px;
    border-radius:5px;
    cursor:pointer;
}

.randomBtn {
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00ffe1,#00b3ff);
    font-weight:bold;
    cursor:pointer;
}

.result {
    margin-top:20px;
    padding:15px;
    background:rgba(0,0,0,0.3);
    border-radius:12px;
    min-height:60px;
}

.glow {
    animation:glow 1s infinite alternate;
}

@keyframes glow {
    from {box-shadow:0 0 10px #00ffe1;}
    to {box-shadow:0 0 25px #00ffe1;}
}
</style>
</head>

<body>

<div class="container">

    <h1 id="title">🔥 Dare Generator</h1>

    <!-- ADMIN PANEL -->
    <div class="admin" id="adminPanel">
        <input type="text" id="dareInput" placeholder="Add dare...">
        <button class="addBtn" onclick="addDare()">+</button>

        <div class="list" id="dareList"></div>
    </div>

    <!-- GAME BUTTON -->
    <button class="randomBtn" onclick="pickDare()">🎯 Pick Dare</button>

    <div class="result" id="result">Click to get a dare</div>

</div>

<script>

let dares = JSON.parse(localStorage.getItem("dares")) || [
"Do 10 pushups",
"Dance for 30 seconds",
"Act like a robot",
"Call a friend and sing"
];

let adminMode = false;

function save() {
    localStorage.setItem("dares", JSON.stringify(dares));
}

function addDare() {
    let val = document.getElementById("dareInput").value.trim();
    if(val==="") return;
    dares.push(val);
    document.getElementById("dareInput").value="";
    renderList();
    save();
}

function removeDare(i){
    dares.splice(i,1);
    renderList();
    save();
}

function renderList(){
    let list=document.getElementById("dareList");
    list.innerHTML="";
    dares.forEach((d,i)=>{
        list.innerHTML+=`
        <div class="dare-item">
            <span>${d}</span>
            <button class="remove" onclick="removeDare(${i})">X</button>
        </div>`;
    });
}

function pickDare(){
    let result=document.getElementById("result");

    if(dares.length===0){
        result.innerText="⚠️ Add dares first!";
        return;
    }

    result.classList.add("glow");
    let i=0;

    let interval=setInterval(()=>{
        result.innerText=dares[Math.floor(Math.random()*dares.length)];
        i++;
        if(i>10){
            clearInterval(interval);
            result.classList.remove("glow");
        }
    },100);
}

// 🔐 SECRET ADMIN MODE (LONG PRESS TITLE)
let pressTimer;

document.getElementById("title").addEventListener("mousedown",()=>{
    pressTimer=setTimeout(toggleAdmin,2000);
});

document.getElementById("title").addEventListener("mouseup",()=>{
    clearTimeout(pressTimer);
});

function toggleAdmin(){
    adminMode=!adminMode;
    document.getElementById("adminPanel").style.display=adminMode?"block":"none";
    if(adminMode) renderList();
}

// ENTER KEY SUPPORT
document.getElementById("dareInput").addEventListener("keypress",(e)=>{
    if(e.key==="Enter") addDare();
});

</script>

</body>
</html>
